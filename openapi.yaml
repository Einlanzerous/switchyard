  /v1/users/me/mentions:
    get:
      tags:
        - Users
      summary: Live scan of @mentions in recent comments + ticket descriptions
      parameters:
        - schema:
            type: string
            format: date-time
          required: false
          name: since
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          required: false
          name: limit
          in: query
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        ticket:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            key:
                              type: string
                              pattern: ^[A-Z][A-Z0-9]{1,9}-[1-9][0-9]*$
                            number:
                              type: integer
                              minimum: 0
                              exclusiveMinimum: true
                            project:
                              type: object
                              properties:
                                id:
                                  type: string
                                  format: uuid
                                key:
                                  type: string
                                  pattern: ^[A-Z][A-Z0-9]{1,9}$
                                name:
                                  type: string
                                  minLength: 1
                                  maxLength: 200
                                color:
                                  type: string
                                  nullable: true
                                  pattern: ^#[0-9a-fA-F]{6}$
                              required:
                                - id
                                - key
                                - name
                                - color
                            type:
                              type: string
                              enum: &a5
                                - spike
                                - task
                                - bug
                                - epic
                            title:
                              type: string
                              minLength: 1
                              maxLength: 500
                            status:
                              type: object
                              properties:
                                id:
                                  type: string
                                  format: uuid
                                category:
                                  type: string
                                  enum: &a4
                                    - backlog
                                    - planning
                                    - in_progress
                                    - blocked
                                    - closed
                                display_name:
                                  type: string
                                  minLength: 1
                                  maxLength: 50
                              required:
                                - id
                                - category
                                - display_name
                            resolution:
                              type: string
                              nullable: true
                              enum: &a6
                                - done
                                - released
                                - cancelled
                            priority:
                              type: string
                              nullable: true
                              enum: &a7
                                - low
                                - medium
                                - high
                                - critical
                            parent_id:
                              type: string
                              nullable: true
                              format: uuid
                            assignee:
                              type: object
                              nullable: true
                              properties:
                                id:
                                  type: string
                                  format: uuid
                                name:
                                  type: string
                                  minLength: 1
                                  maxLength: 100
                                icon:
                                  type: string
                                  nullable: true
                                  maxLength: 500
                                type:
                                  type: string
                                  enum: *a2
                              required:
                                - id
                                - name
                                - icon
                                - type
                            reporter:
                              type: object
