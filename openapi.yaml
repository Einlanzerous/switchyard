                      - message
                required:
                  - error
        "500":
          description: internal
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        enum: *a1
                      message:
                        type: string
                      details:
                        type: object
                        additionalProperties:
                          nullable: true
                    required:
                      - code
                      - message
                required:
                  - error
    post:
      tags:
        - Users
      summary: Create a user
      requestBody:
