openapi: 3.0.0
info:
  title: switchyard
  version: 0.0.0
  description: "Self-hosted ticketing API. Agent-friendly: cursor pagination,
    idempotency keys, structured errors."
servers:
  - url: http://localhost:4002
components:
  schemas: {}
  parameters: {}
paths:
  /v1/users:
    get:
      tags:
        - Users
      summary: List users
      parameters:
        - schema:
            type: string
            minLength: 1
          required: false
          name: cursor
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          required: false
          name: limit
          in: query
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                          minLength: 1
                          maxLength: 100
                        icon:
                          type: string
                          nullable: true
                          maxLength: 500
                        type:
                          type: string
                          enum: &a2
                            - agent
                            - human
                        instance_role:
                          type: string
                          enum: &a3
                            - owner
                            - member
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                        deleted_at:
                          type: string
                          nullable: true
                          format: date-time
                      required:
                        - id
                        - name
                        - icon
                        - type
                        - instance_role
                        - created_at
                        - updated_at
                        - deleted_at
                  page:
                    type: object
                    properties:
                      next_cursor:
                        type: string
                        nullable: true
                      has_more:
                        type: boolean
                    required:
                      - next_cursor
                      - has_more
                required:
                  - items
                  - page
        "400":
          description: bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        enum: &a1
                          - bad_request
                          - unauthorized
                          - forbidden
                          - not_found
                          - conflict
                          - unprocessable
                          - rate_limited
                          - internal
                          - service_unavailable
                      message:
                        type: string
                      details:
                        type: object
                        additionalProperties:
                          nullable: true
                    required:
                      - code
                      - message
                required:
                  - error
        "401":
          description: unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        enum: *a1
                      message:
                        type: string
                      details:
                        type: object
                        additionalProperties:
                          nullable: true
                    required:
                      - code
                      - message
                required:
                  - error
        "403":
          description: forbidden
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        enum: *a1
                      message:
                        type: string
                      details:
                        type: object
                        additionalProperties:
                          nullable: true
                    required:
                      - code
                      - message
                required:
                  - error
        "404":
          description: not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        enum: *a1
                      message:
                        type: string
                      details:
                        type: object
                        additionalProperties:
                          nullable: true
                    required:
                      - code
                      - message
                required:
                  - error
        "409":
          description: conflict
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        enum: *a1
                      message:
                        type: string
                      details:
                        type: object
                        additionalProperties:
                          nullable: true
                    required:
                      - code
                      - message
                required:
                  - error
        "422":
          description: unprocessable
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        enum: *a1
                      message:
                        type: string
                      details:
                        type: object
                        additionalProperties:
                          nullable: true
                    required:
