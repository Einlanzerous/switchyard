openapi: 3.0.0
info:
  title: switchyard
  version: 0.0.0
  description: "Self-hosted ticketing API. Agent-friendly: cursor pagination,
    idempotency keys, structured errors."
servers:
  - url: http://localhost:4002
components:
  schemas: {}
  parameters: {}
