  /v1/users/me/notifications:
    get:
      tags:
        - Users
      summary: Persistent notifications (mentions today; more kinds later)
      parameters:
        - schema:
            type: string
            minLength: 1
          required: false
          name: cursor
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          required: false
          name: limit
          in: query
        - schema:
            type: string
            enum:
              - all
              - unread
            default: unread
          required: false
          name: status
          in: query
        - schema:
            type: string
            format: date-time
          required: false
          name: since
          in: query
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        kind:
                          type: string
                          enum:
                            - mention
                        actor:
                          type: object
                          nullable: true
                          properties:
                            id:
                              type: string
                              format: uuid
                            name:
                              type: string
                              minLength: 1
                              maxLength: 100
                            icon:
                              type: string
                              nullable: true
                              maxLength: 500
                            type:
                              type: string
                              enum: *a2
                          required:
                            - id
                            - name
                            - icon
                            - type
                        ticket:
                          type: object
                          nullable: true
                          properties:
                            id:
                              type: string
                              format: uuid
                            key:
                              type: string
                              pattern: ^[A-Z][A-Z0-9]{1,9}-[1-9][0-9]*$
                            number:
                              type: integer
                              minimum: 0
                              exclusiveMinimum: true
                            project:
                              type: object
                              properties:
                                id:
                                  type: string
                                  format: uuid
                                key:
                                  type: string
                                  pattern: ^[A-Z][A-Z0-9]{1,9}$
                                name:
                                  type: string
                                  minLength: 1
                                  maxLength: 200
                                color:
                                  type: string
                                  nullable: true
                                  pattern: ^#[0-9a-fA-F]{6}$
                                repo_url:
                                  type: string
                                  nullable: true
                                  maxLength: 2048
                                  format: uri
                              required:
                                - id
                                - key
                                - name
                                - color
                                - repo_url
                            type:
                              type: string
                              enum: &a8
                                - spike
                                - task
                                - bug
                                - epic
                            title:
                              type: string
                              minLength: 1
                              maxLength: 500
                            status:
                              type: object
                              properties:
                                id:
                                  type: string
                                  format: uuid
                                category:
                                  type: string
                                  enum: &a7
                                    - backlog
                                    - planning
                                    - in_progress
                                    - blocked
                                    - closed
                                display_name:
                                  type: string
                                  minLength: 1
                                  maxLength: 50
                              required:
                                - id
                                - category
                                - display_name
                            resolution:
                              type: string
                              nullable: true
                              enum: &a9
                                - done
                                - released
                                - cancelled
                            priority:
                              type: string
                              nullable: true
                              enum: &a10
                                - low
                                - medium
                                - high
                                - critical
                            parent_id:
                              type: string
                              nullable: true
                              format: uuid
                            parent:
                              type: object
                              nullable: true
                              properties:
                                id:
                                  type: string
                                  format: uuid
                                key:
                                  type: string
                                title:
                                  type: string
                              required:
                                - id
                                - key
                                - title
                            assignee:
                              type: object
                              nullable: true
                              properties:
                                id:
                                  type: string
                                  format: uuid
                                name:
                                  type: string
                                  minLength: 1
                                  maxLength: 100
                                icon:
                                  type: string
                                  nullable: true
                                  maxLength: 500
                                type:
                                  type: string
                                  enum: *a2
                              required:
                                - id
                                - name
                                - icon
                                - type
                            reporter:
                              type: object
                              properties:
                                id:
                                  type: string
                                  format: uuid
                                name:
                                  type: string
                                  minLength: 1
                                  maxLength: 100
                                icon:
                                  type: string
                                  nullable: true
                                  maxLength: 500
                                type:
                                  type: string
                                  enum: *a2
                              required:
                                - id
                                - name
                                - icon
                                - type
                            due_date:
                              type: string
                              nullable: true
                              format: date-time
                            labels:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                    format: uuid
                                  name:
                                    type: string
                                    minLength: 1
                                    maxLength: 50
                                  color:
                                    type: string
                                    pattern: ^#[0-9a-fA-F]{6}$
                                required:
                                  - id
                                  - name
                                  - color
                            position:
                              type: number
                              nullable: true
                            external_refs:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                    format: uuid
                                  ticket_id:
                                    type: string
                                    format: uuid
                                  kind:
                                    type: string
                                    enum: &a11
                                      - github_pr
                                      - github_issue
                                      - github_commit
                                      - github_action
                                      - generic
                                  url:
                                    type: string
                                    format: uri
                                  state:
                                    type: string
                                    nullable: true
                                    enum: &a12
                                      - open
                                      - closed
                                      - merged
                                      - success
                                      - failed
                                  title:
                                    type: string
                                    nullable: true
                                  polled_at:
                                    type: string
                                    nullable: true
                                    format: date-time
                                  polled_state_changed_at:
                                    type: string
                                    nullable: true
                                    format: date-time
                                  created_at:
                                    type: string
                                    format: date-time
                                  created_by:
                                    type: object
                                    properties:
                                      id:
                                        type: string
                                        format: uuid
                                      name:
                                        type: string
                                        minLength: 1
                                        maxLength: 100
                                      icon:
                                        type: string
                                        nullable: true
                                        maxLength: 500
                                      type:
                                        type: string
                                        enum: *a2
                                    required:
                                      - id
                                      - name
                                      - icon
                                      - type
                                required:
                                  - id
                                  - ticket_id
                                  - kind
                                  - url
                                  - state
                                  - title
                                  - polled_at
                                  - polled_state_changed_at
                                  - created_at
                                  - created_by
                            template_id:
                              type: string
                              nullable: true
                              format: uuid
                            created_at:
                              type: string
                              format: date-time
                            updated_at:
                              type: string
                              format: date-time
                            deleted_at:
                              type: string
                              nullable: true
                              format: date-time
                          required:
                            - id
                            - key
                            - number
                            - project
                            - type
                            - title
                            - status
                            - resolution
                            - priority
                            - parent_id
                            - assignee
                            - reporter
                            - due_date
                            - labels
                            - position
                            - external_refs
                            - template_id
                            - created_at
                            - updated_at
                            - deleted_at
                        comment_id:
                          type: string
                          nullable: true
                          format: uuid
                        payload:
                          type: object
                          properties:
                            source:
                              type: string
                              enum:
                                - comment
                                - description
                            snippet:
                              type: string
                            actor:
                              type: object
                              nullable: true
                              properties:
                                id:
                                  type: string
                                  format: uuid
                                name:
                                  type: string
                                  minLength: 1
                                  maxLength: 100
                                icon:
                                  type: string
                                  nullable: true
                                  maxLength: 500
                                type:
                                  type: string
                                  enum: *a2
                              required:
                                - id
                                - name
                                - icon
                                - type
                          required:
                            - source
                            - snippet
                        read_at:
                          type: string
                          nullable: true
                          format: date-time
                        created_at:
                          type: string
                          format: date-time
                      required:
                        - id
                        - kind
                        - actor
                        - ticket
                        - comment_id
                        - payload
                        - read_at
                        - created_at
                  page:
                    type: object
                    properties:
                      next_cursor:
                        type: string
                        nullable: true
                      has_more:
                        type: boolean
                    required:
                      - next_cursor
                      - has_more
                required:
                  - items
                  - page
        "400":
          description: bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        enum: *a1
                      message:
