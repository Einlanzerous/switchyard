                                id:
                                  type: string
                                  format: uuid
                                name:
                                  type: string
                                  minLength: 1
                                  maxLength: 100
                                icon:
                                  type: string
                                  nullable: true
                                  maxLength: 500
                                type:
                                  type: string
                                  enum: *a2
                              required:
                                - id
                                - name
                                - icon
                                - type
                            due_date:
                              type: string
                              nullable: true
                              format: date-time
                            labels:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                    format: uuid
                                  name:
                                    type: string
                                    minLength: 1
                                    maxLength: 50
                                  color:
                                    type: string
                                    pattern: ^#[0-9a-fA-F]{6}$
                                required:
                                  - id
                                  - name
                                  - color
                            position:
                              type: number
                              nullable: true
                            created_at:
                              type: string
                              format: date-time
                            updated_at:
                              type: string
                              format: date-time
                            deleted_at:
                              type: string
                              nullable: true
                              format: date-time
                          required:
                            - id
                            - key
                            - number
                            - project
                            - type
                            - title
                            - status
                            - resolution
                            - priority
                            - parent_id
                            - assignee
                            - reporter
                            - due_date
                            - labels
                            - position
                            - created_at
                            - updated_at
                            - deleted_at
                        comment_id:
                          type: string
                          nullable: true
                          format: uuid
                        snippet:
                          type: string
                        mentioned_at:
                          type: string
                          format: date-time
