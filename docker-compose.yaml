services:
  switchyard:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: switchyard
    restart: unless-stopped
    environment:
      - PORT=4002
      - DATABASE_URL=${DATABASE_URL}
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:4002}
      - UPLOAD_DIR=/data/uploads
      - BOOTSTRAP_TOKEN=${BOOTSTRAP_TOKEN}
    volumes:
      - switchyard_uploads:/data/uploads
    networks:
      - construct_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:4002/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      # Watchtower runs Mondays at 04:00 with rolling restart — opt out so
      # deploys are explicit. (Vikunja's password-drift bug is suspected to
      # come from this.)
      - "com.centurylinklabs.watchtower.enable=false"

  switchyard-frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: switchyard-frontend
    restart: unless-stopped
    ports:
      - "${SWITCHYARD_PORT:-4002}:4002"
    environment:
      - PORT=4002
      - BACKEND_URL=http://switchyard:4002
    networks:
      - construct_net
    depends_on:
      switchyard:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

volumes:
  switchyard_uploads:

networks:
  construct_net:
    external: true
