name: Update Knowledge Graph

on:
  push:
    branches: [main]
    paths-ignore:
      - 'graphify-out/**'

permissions:
  contents: write

jobs:
  graphify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Admin-scoped PAT so the auto-commit push below authenticates as a
          # repo admin and bypasses the `main` ruleset. The default GITHUB_TOKEN
          # pushes as github-actions[bot], which the ruleset would block.
          token: ${{ secrets.GRAPHIFY_PUSH_TOKEN }}

      - uses: astral-sh/setup-uv@v5

      - name: Install graphify
        # graphifyy doesn't declare `anthropic` as a dependency, but the
        # `claude` semantic backend imports it at runtime — inject it into
        # the tool environment so `graphify extract` doesn't bail with
        # "requires the anthropic package".
        run: uv tool install graphifyy --with anthropic

      - name: Build knowledge graph
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: graphify extract .

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add graphify-out/GRAPH_REPORT.md graphify-out/cache/
          git diff --staged --quiet && exit 0
          git commit -m "chore: update knowledge graph [skip ci]"
          git push
