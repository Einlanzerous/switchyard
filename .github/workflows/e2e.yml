name: E2E

# Runs the Playwright suite against a fresh dev server. Same trigger
# rules as CI — push to main + every PR — but in a separate workflow so
# E2E flakes don't block lockfile/typecheck CI and vice versa.
#
# Designed for the user's self-hosted runner (homelab). The runner has
# direct access to the dev Postgres (the same one /5173 dev hits), and
# we use a separate test DB so a failing run doesn't poison dev data.
# To run on GitHub-hosted runners instead, add a postgres service
# container under `services:` and point DATABASE_URL at it.
#
# Backend boot: the suite spins up its own switchyard backend from
# source on a non-prod port (4003), wired to switchyard_test, and points
# the Vite dev server's API proxy at it (VITE_API_PROXY_TARGET). This
# keeps the test data fully isolated from the deployed :4002 backend,
# which reads the prod `switchyard` DB.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    # Self-hosted by default — change to `ubuntu-latest` if you wire up a
    # service container or migrate to GitHub-hosted runners.
    runs-on: self-hosted
    timeout-minutes: 20

    env:
      # Separate test DB, same Postgres instance as dev. The DB name
      # (`switchyard_test`) must exist on the host's Postgres before this
      # workflow runs — provision once with:
      #   psql -c 'CREATE DATABASE switchyard_test OWNER switchyard_user;'
      DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}

      # Long-lived admin token on the test DB. Mint once with the
      # bootstrap flow and store as a repo secret. The auth.setup project
      # uses this to mint a per-test-user token at runtime.
      BOOTSTRAP_TOKEN: ${{ secrets.E2E_BOOTSTRAP_TOKEN }}

      # NB: E2E_TEST_USER_TOKEN intentionally NOT set. The pre-minted
      # secret was registered in the prod `switchyard` DB and won't
      # validate against the test backend (which reads switchyard_test).
      # auth.setup falls through to the mint path, which calls POST
      # /v1/users/{id}/tokens against the test backend using the
      # BOOTSTRAP_TOKEN above — that token IS registered in
      # switchyard_test by the migrate/seed step earlier in this job.

      # Port the test backend listens on. Must not collide with the
      # deployed :4002 backend on the same host.
      E2E_BACKEND_PORT: "4003"

      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      # Reset the test DB to a known state before each run. `db:migrate`
      # is idempotent so this is safe even when the DB already exists;
      # the seed adds canonical users + bootstrap token.
      #
      # NOTE: `bun --cwd <dir> run <script>` doesn't actually work the
      # way it reads — bun's argument parser shows help instead of
      # running the script, and exits 0, so the workflow silently
      # advances past a no-op migrate. Use the step's
      # `working-directory:` instead (same fix we did for the playwright
      # step).
      - name: Migrate test DB
        working-directory: server
        run: bun run db:migrate

      - name: Seed E2E fixtures
        working-directory: server
        run: bun run seed:test-e2e

      # Boot a switchyard backend from current source against
      # switchyard_test on E2E_BACKEND_PORT. This is what Playwright
      # actually talks to (via the Vite proxy override below), giving
      # the suite a hermetic, prod-isolated environment.
      #
      # The PID is captured so the cleanup step can always reap it.
      # Logs go to /tmp/e2e-backend.log; we dump them on failure for
      # debugging.
      - name: Start test backend
        working-directory: server
        env:
          PORT: ${{ env.E2E_BACKEND_PORT }}
          PUBLIC_URL: http://localhost:${{ env.E2E_BACKEND_PORT }}
          UPLOAD_DIR: /tmp/e2e-uploads
          NODE_ENV: production
        run: |
          mkdir -p /tmp/e2e-uploads
          bun src/index.ts > /tmp/e2e-backend.log 2>&1 &
          echo $! > /tmp/e2e-backend.pid
          for i in $(seq 1 30); do
            if curl -fsS "http://localhost:${E2E_BACKEND_PORT}/healthz" > /dev/null 2>&1; then
              echo "[e2e] backend ready on :${E2E_BACKEND_PORT}"
              exit 0
            fi
            sleep 1
          done
          echo "[e2e] backend failed to start within 30s"
          cat /tmp/e2e-backend.log || true
          exit 1

      # Playwright manages its own browser binaries; cache them between
      # runs to skip the ~200MB download.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('client/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # Browser binaries only — system dependencies (libnss3, libatk1.0-0,
      # etc.) are pre-installed on the self-hosted host. Matches the
      # legislator-lookup-tool-cc pattern: `playwright install` without
      # `--with-deps`, since `--with-deps` tries to apt-get and the
      # runner user typically can't sudo non-interactively.
      #
      # NOTE: `bunx --cwd client` doesn't work the way `bun --cwd client
      # run` does — `bunx`/`bun x` reads its first arg as the package
      # name, so `--cwd` becomes the "package" and bun complains. Set
      # working-directory on the step instead.
      #
      # If you ever rebuild the runner host, install the system deps once:
      #   sudo $(which bunx) playwright install-deps chromium firefox
      - name: Install Playwright browsers
        working-directory: client
        run: bunx playwright install chromium firefox

      # VITE_API_PROXY_TARGET makes the Vite dev server (started by the
      # `webServer` block in playwright.config.ts) proxy /v1 and /healthz
      # at the test backend instead of the deployed :4002 one.
      - name: Run Playwright
        working-directory: client
        env:
          VITE_API_PROXY_TARGET: http://localhost:${{ env.E2E_BACKEND_PORT }}
        run: bun run test:e2e

      - name: Stop test backend
        if: always()
        run: |
          if [ -f /tmp/e2e-backend.pid ]; then
            kill "$(cat /tmp/e2e-backend.pid)" 2>/dev/null || true
            rm -f /tmp/e2e-backend.pid
          fi

      - name: Dump test backend log on failure
        if: failure()
        run: |
          echo "=== /tmp/e2e-backend.log ==="
          cat /tmp/e2e-backend.log || true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7

      # Trace + per-test screenshots / videos live under test-results/.
      # These are gold for diagnosing CI-only flakes — uploaded
      # separately so the report and the raw traces can be downloaded
      # independently.
      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: client/test-results/
          retention-days: 7
          if-no-files-found: ignore
