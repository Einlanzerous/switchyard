name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      # Mint a short-lived installation token from our GitHub App so the
      # release PR is created by the App identity rather than the default
      # GITHUB_TOKEN. Events from GITHUB_TOKEN don't trigger other
      # workflows (GitHub's anti-recursion safeguard), which is why the
      # release PR's required `typecheck-and-test` / `e2e` checks never
      # ran. An App-minted token is a real actor, so those checks fire.
      # Requires repo (or org) secrets RELEASE_BOT_APP_ID +
      # RELEASE_BOT_PRIVATE_KEY; the App needs Contents: write +
      # Pull requests: write on this repo.
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          # Manifest/config-file mode. `simple` is still the right release-type
          # (a bun workspace with three unpublished package.json files; version
          # is tracked as one root component, not per-package) — it now lives in
          # release-please-config.json so we can also set `changelog-sections`
          # to surface chore/refactor/polish work in the release notes. The
          # action defaults to these filenames, but we name them explicitly.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-push:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.version }}
            type=raw,value=latest

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          # Build context is the repo root (not server/) — the Bun workspace
          # Dockerfile needs root package.json + bun.lock + every workspace's
          # package.json at install time.
          context: .
          file: ./server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.version }}
            type=raw,value=latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./client/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          # Bake the release-please semver into the Vue bundle so the
          # sidebar footer can render it (see client/src/lib/version.ts).
          build-args: |
            VITE_APP_VERSION=${{ needs.release-please.outputs.version }}

      # Mint a short-lived, least-privilege token for the cross-repo dispatch
      # instead of a hand-managed PAT. The release bot App is already installed
      # on construct-server (all-repos) with Contents: write — exactly what
      # repository_dispatch needs — so this needs no extra secret to babysit.
      # Scoped to construct-server only. Replaces CONSTRUCT_DISPATCH_TOKEN, whose
      # PAT kept expiring and 401'ing the release ("Bad credentials").
      - name: Mint construct-server dispatch token
        id: dispatch-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: Einlanzerous
          repositories: construct-server

      - name: Notify construct-server
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.dispatch-token.outputs.token }}
          repository: Einlanzerous/construct-server
          event-type: image-updated
          client-payload: '{"image": "switchyard", "version": "${{ needs.release-please.outputs.version }}"}'
