name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck (shared + server + client)
        run: bun run typecheck

      - name: Unit tests (no DB needed)
        run: cd server && bun run test:unit

      - name: Production client build
        run: cd client && bun run build
