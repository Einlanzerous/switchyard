name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck (shared + server + client)
        run: bun run typecheck

      # The root typecheck above is plain `tsc -b`, which cannot see Vue SFC
      # `<template>` type errors AND leaves a `.tsbuildinfo` that makes a plain
      # `vue-tsc -b` skip the client project. `--force` ignores that build info
      # and does a full check, so template errors (e.g. an exhaustive
      # `Record<TicketType>` missing a key) fail the PR gate instead of slipping
      # to main and breaking the release build. See SWY-126.
      - name: Typecheck client templates (vue-tsc — SFC type-check tsc -b misses)
        run: cd client && bun run type-check

      - name: Authz guard (Phase 6 — no unscoped project-table reads)
        run: cd server && bun scripts/authz-guard.ts

      - name: Unit tests (no DB needed)
        run: cd server && bun run test:unit

      - name: Production client build
        run: cd client && bun run build
